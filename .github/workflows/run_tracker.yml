# Startup tracker agent.
#
# Runs on Ollama Cloud: the LLM nodes (resolve_board tool-calling + dossier
# synthesis) call https://ollama.com via OLLAMA_API_KEY, so a standard
# GitHub-hosted runner is enough (no local Ollama / GPU needed). config.build_ollama
# switches to the cloud host the moment OLLAMA_API_KEY is set; SYNTHESIS_MODEL below
# drives synthesis + board resolution.
#
# Required repo secret: OLLAMA_API_KEY (https://ollama.com/settings/keys).
# Reads from the store that ingest.yml populates on cron.
name: Run tracker agent

on:
  workflow_dispatch:
  schedule:
    - cron: "0 9 * * *"   # daily 09:00 UTC (after the 08:00 ingest)

jobs:
  run-tracker:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run tracker agent
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_TRACKER_DOSSIERS_PAGE_ID: ${{ secrets.NOTION_TRACKER_DOSSIERS_PAGE_ID }}
          LINEAR_API_KEY: ${{ secrets.LINEAR_API_KEY }}
          LANGSMITH_API_KEY: ${{ secrets.LANGSMITH_API_KEY }}
          # Ollama Cloud — key alone routes models to https://ollama.com
          OLLAMA_API_KEY: ${{ secrets.OLLAMA_API_KEY }}
          EXTRACTION_MODEL: gpt-oss:20b
          SYNTHESIS_MODEL: gpt-oss:120b
        run: python scripts/run_tracker.py
