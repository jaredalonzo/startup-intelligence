# Skills trend agent.
#
# Runs on Ollama Cloud: the LLM nodes call https://ollama.com via OLLAMA_API_KEY,
# so a standard GitHub-hosted runner is enough (no local Ollama / GPU needed).
# config.build_ollama switches to the cloud host the moment OLLAMA_API_KEY is set;
# the model assignments come from EXTRACTION_MODEL / SYNTHESIS_MODEL below.
#
# Required repo secret: OLLAMA_API_KEY (https://ollama.com/settings/keys).
# Reads from the store that ingest.yml populates on cron.
name: Run skills agent

on:
  workflow_dispatch:
    inputs:
      all_roles:
        description: "Extract all roles (skip the technical-only filter)"
        type: boolean
        default: false
  schedule:
    - cron: "0 10 * * 1"   # weekly, Mon 10:00 UTC (after the daily tracker run)

jobs:
  run-skills:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run skills agent
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_SKILLS_RADAR_PAGE_ID: ${{ secrets.NOTION_SKILLS_RADAR_PAGE_ID }}
          LINEAR_API_KEY: ${{ secrets.LINEAR_API_KEY }}
          LANGSMITH_API_KEY: ${{ secrets.LANGSMITH_API_KEY }}
          # Ollama Cloud — key alone routes models to https://ollama.com
          OLLAMA_API_KEY: ${{ secrets.OLLAMA_API_KEY }}
          EXTRACTION_MODEL: gpt-oss:20b
          SYNTHESIS_MODEL: gpt-oss:120b
        # inputs.all_roles is set only on manual dispatch; scheduled runs omit the
        # flag and keep the default technical-only filter.
        run: python scripts/run_skills.py ${{ inputs.all_roles && '--all-roles' || '' }}
