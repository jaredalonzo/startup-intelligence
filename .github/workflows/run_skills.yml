# Skills trend agent.
#
# Runs on Ollama Cloud: the LLM nodes call https://ollama.com via OLLAMA_API_KEY,
# so a standard GitHub-hosted runner is enough (no local Ollama / GPU needed).
# config.build_ollama switches to the cloud host the moment OLLAMA_API_KEY is set;
# the model assignments come from EXTRACTION_MODEL / SYNTHESIS_MODEL below.
#
# Required repo secret: OLLAMA_API_KEY (https://ollama.com/settings/keys).
# Reads from the store that ingest.yml populates on cron.
name: Run skills agent

on:
  workflow_dispatch:
    inputs:
      window_days:
        description: "Lookback window in days (overrides the stored watermark)"
        type: string
        default: "1"
      all_roles:
        description: "Extract all roles (skip the technical-only filter)"
        type: boolean
        default: false
  schedule:
    - cron: "0 10 * * *"   # daily 10:00 UTC (after the 09:00 tracker run)

jobs:
  run-skills:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run skills agent
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_SKILLS_RADAR_PAGE_ID: ${{ secrets.NOTION_SKILLS_RADAR_PAGE_ID }}
          LINEAR_API_KEY: ${{ secrets.LINEAR_API_KEY }}
          LANGSMITH_API_KEY: ${{ secrets.LANGSMITH_API_KEY }}
          # Ollama Cloud — key alone routes models to https://ollama.com
          OLLAMA_API_KEY: ${{ secrets.OLLAMA_API_KEY }}
          EXTRACTION_MODEL: gpt-oss:20b
          SYNTHESIS_MODEL: gpt-oss:120b
        # inputs.* are set only on manual dispatch; scheduled runs omit them, so
        # window_days falls back to 1 (a one-day lookback) and the technical-only
        # filter stays on. A small daily window keeps each run well under the
        # job timeout instead of re-processing a week of postings at once.
        run: python scripts/run_skills.py --window-days ${{ inputs.window_days || '1' }} ${{ inputs.all_roles && '--all-roles' || '' }}
