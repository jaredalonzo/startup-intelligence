# Skills trend agent.
#
# Trigger is manual (workflow_dispatch) by design. The agent's LLM nodes are
# canonically local Ollama (qwen2.5:14b, ~17GB) — a standard GitHub-hosted runner
# cannot run that model, and a full run is multi-hour (see JAR-60). To put this on
# a real cron you need EITHER:
#   * a self-hosted runner with Ollama (swap `runs-on` below, then enable `schedule`), OR
#   * switch config.py to the Anthropic models and provide ANTHROPIC_API_KEY.
# The `schedule` block is left commented so enabling cron is a one-line change once
# one of those is in place. Ingestion (ingest.yml) already runs on cron and is what
# this agent reads from.
name: Run skills agent

on:
  workflow_dispatch:
  # schedule:
  #   - cron: "0 9 * * 1"   # weekly, Mon 09:00 UTC — enable on a self-hosted Ollama runner

jobs:
  run-skills:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run skills agent
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_SKILLS_RADAR_PAGE_ID: ${{ secrets.NOTION_SKILLS_RADAR_PAGE_ID }}
          LINEAR_API_KEY: ${{ secrets.LINEAR_API_KEY }}
          LANGSMITH_API_KEY: ${{ secrets.LANGSMITH_API_KEY }}
          # ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}   # needed if config.py uses Anthropic
        run: python scripts/run_skills.py
