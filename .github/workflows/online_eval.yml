# Online LLM-as-judge over live skills-agent traces.
#
# Scores recent production `extract_one` runs in LangSmith with the same judge
# the offline bake-off uses, writing the verdict back as run feedback. This turns
# the offline quality metric into a continuous signal on real traffic — no fixed
# dataset. Idempotent: runs already carrying the feedback key are skipped, so the
# cron is safe to re-run.
#
# Reads and writes LangSmith only (trace store + feedback); it does NOT touch the
# Postgres store, so no DATABASE_URL. The default judge (gpt-oss:120b) routes to
# https://ollama.com the moment OLLAMA_API_KEY is set — same as the skills agent.
#
# Required repo secrets: LANGSMITH_API_KEY (read traces + write feedback),
# OLLAMA_API_KEY (the cloud judge model). Runs after the daily skills agent so it
# scores that run's fresh extraction traces.
name: Online eval

on:
  workflow_dispatch:
    inputs:
      since_hours:
        description: "Only score runs started within this many hours"
        type: string
        default: "24"
      limit:
        description: "Max runs to pull per invocation"
        type: string
        default: "100"
      dry_run:
        description: "Judge and log, but do not write feedback"
        type: boolean
        default: false
  schedule:
    - cron: "0 11 * * *"   # daily 11:00 UTC (after the 10:00 skills run)

jobs:
  online-eval:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Score live extraction traces
        env:
          LANGSMITH_API_KEY: ${{ secrets.LANGSMITH_API_KEY }}
          # Ollama Cloud — key alone routes the judge model to https://ollama.com
          OLLAMA_API_KEY: ${{ secrets.OLLAMA_API_KEY }}
          EVAL_JUDGE_MODEL: gpt-oss:120b
        # inputs.* are set only on manual dispatch; scheduled runs omit them and
        # fall back to a 24h window (matching the daily cron cadence).
        run: >-
          python scripts/online_eval.py
          --since-hours ${{ inputs.since_hours || '24' }}
          --limit ${{ inputs.limit || '100' }}
          ${{ inputs.dry_run && '--dry-run' || '' }}
