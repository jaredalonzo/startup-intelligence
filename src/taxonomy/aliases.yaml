# taxonomy/aliases.yaml
#
# Maps any variant spelling to its canonical form.
# The set of right-hand values defines the known skill taxonomy.
# Skills appearing in extractions that are neither a key nor a value here
# are written to unknown_skills state for periodic review and back-fill.
#
# Convention: include canonical → canonical entries to register a skill as
# "known" without needing a synonym. Add synonyms below the canonical entry.

